apiVersion: apps/v1
kind: Deployment
metadata:
  name: mq-producer
  labels:
    app: mq-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mq-producer
  template:
    metadata:
      labels:
        app: mq-producer
    spec:
      containers:
        - name: mq-producer
          image: image-registry.openshift-image-registry.svc:5000/$(NAMESPACE)/mq-producer:latest
          imagePullPolicy: Always
          env:
            - name: MQ_HOST
              value: qmdemo-ibm-mq
            - name: MQ_PORT
              value: "1414"
            - name: MQ_QUEUE_MANAGER
              value: QMDEMO
            - name: MQ_CHANNEL
              value: DEV.APP.SVRCONN.0TLS
            - name: MQ_QUEUE_NAME
              value: DEV.QUEUE.1
            - name: MQ_APP_NAME
              value: MY-PRODUCER
            - name: MQ_APP_USERNAME
              value: app
            - name: MQ_MESSAGE
              value: Test some data here
            - name: MQ_MESSAGE_COUNT
              value: "4000"
            - name: MQ_SEND_SLEEP_MILLIS
              value: "3000"
            - name: MQ_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-client-auth
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

