apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-consumer
  labels:
    app: jms-consumer
    app.kubernetes.io/name: jms-consumer
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: ibmmq-jms-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jms-consumer
  template:
    metadata:
      labels:
        app: jms-consumer
        app.kubernetes.io/name: jms-consumer
        app.kubernetes.io/component: messaging
    spec:
      containers:
        - name: jms-consumer
          image: ghcr.io/fabien-sanglier-ibm/ibmmq-demoapps-jms/jmsconsumer:latest
          imagePullPolicy: Always
          env:
            - name: MQ_HOST
              value: qmdemo-ibm-mq
            - name: MQ_PORT
              value: "1414"
            - name: MQ_QUEUE_MANAGER
              value: QMDEMO
            - name: MQ_CHANNEL
              value: DEV.APP.SVRCONN.0TLS
            - name: MQ_QUEUE_NAME
              value: DEV.QUEUE.1
            - name: MQ_APP_NAME
              value: MY-CONSUMER
            - name: MQ_APP_USERNAME
              value: app
            - name: MQ_RECEIVE_SLEEP_MILLIS
              value: "500"
            - name: MQ_RECEIVE_TIMEOUT_MILLIS
              value: "1000"
            - name: MQ_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-client-auth
                  key: password
            # Uncomment below for TLS/mTLS configuration
            # Option 1: Using JKS truststore (traditional approach)
            # - name: MQ_SSL_CIPHER_SUITE
            #   value: "TLS_RSA_WITH_AES_128_CBC_SHA256"
            # - name: MQ_SSL_KEYSTORE_PATH
            #   value: "/etc/ssl/certs/client-keystore.jks"
            # - name: MQ_SSL_KEYSTORE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: mq-tls-certs
            #       key: keystore-password
            # - name: MQ_SSL_TRUSTSTORE_PATH
            #   value: "/etc/ssl/certs/truststore.jks"
            # - name: MQ_SSL_TRUSTSTORE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: mq-tls-certs
            #       key: truststore-password
            # - name: MQ_SSL_PEER_NAME_ENABLED
            #   value: "true"
            
            # Option 2: Using CA certificate directly (PEM format)
            # - name: MQ_SSL_CIPHER_SUITE
            #   value: "TLS_RSA_WITH_AES_128_CBC_SHA256"
            # - name: MQ_SSL_CA_CERT_PATH
            #   value: "/etc/ssl/certs/ca.crt"
            # - name: MQ_SSL_KEYSTORE_PATH
            #   value: "/etc/ssl/certs/client-keystore.jks"
            # - name: MQ_SSL_KEYSTORE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: mq-tls-certs
            #       key: keystore-password
            # - name: MQ_SSL_PEER_NAME_ENABLED
            #   value: "true"
          # Uncomment below to mount TLS certificates from a secret
          # volumeMounts:
          #   - name: tls-certs
          #     mountPath: /etc/ssl/certs
          #     readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      # Uncomment below to mount TLS certificates from a secret
      # Option 1: Mount JKS files (traditional approach)
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: mq-tls-certs
      #       items:
      #         - key: client-keystore.jks
      #           path: client-keystore.jks
      #         - key: truststore.jks
      #           path: truststore.jks
      
      # Option 2: Mount CA certificate directly (PEM format)
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: mq-tls-certs
      #       items:
      #         - key: ca.crt
      #           path: ca.crt
      #         - key: client-keystore.jks
      #           path: client-keystore.jks
      restartPolicy: Always

# Made with Bob
