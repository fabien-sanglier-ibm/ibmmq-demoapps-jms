apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-consumer
  labels:
    app: jms-consumer
    app.kubernetes.io/name: jms-consumer
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: ibmmq-jms-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jms-consumer
  template:
    metadata:
      labels:
        app: jms-consumer
        app.kubernetes.io/name: jms-consumer
        app.kubernetes.io/component: messaging
    spec:
      containers:
        - name: jms-consumer
          image: ghcr.io/fabien-sanglier-ibm/ibmmq-demoapps-jms/jmsconsumer:latest
          imagePullPolicy: Always
          env:
            # CCDT Configuration (for uniform cluster or multi-instance QM)
            # When using CCDT, only MQ_CCDT_URL is required - all other connection details come from CCDT
            # Uncomment to use CCDT instead of direct connection
            # - name: MQ_CCDT_URL
            #   value: "file:///etc/mq/ccdt.json"
            # Optional overrides (if not set, values from CCDT file are used):
            # - name: MQ_QUEUE_MANAGER
            #   value: "*"  # Use * for uniform cluster
            # - name: MQ_CHANNEL
            #   value: "SYSTEM.DEF.SVRCONN"
            
            # Standard Connection (single queue manager)
            # These are ignored when MQ_CCDT_URL is set
            - name: MQ_HOST
              value: qmdemo-ibm-mq
            - name: MQ_PORT
              value: "1414"
            - name: MQ_QUEUE_MANAGER
              value: QMDEMO
            - name: MQ_CHANNEL
              value: DEV.APP.SVRCONN.0TLS
            - name: MQ_QUEUE_NAME
              value: DEV.QUEUE.1
            - name: MQ_APP_NAME
              value: MY-CONSUMER
            - name: MQ_APP_USERNAME
              value: app
            - name: MQ_RECEIVE_SLEEP_MILLIS
              value: "500"
            - name: MQ_RECEIVE_TIMEOUT_MILLIS
              value: "1000"
            - name: MQ_ENABLE_MESSAGE_COUNT
              value: "false"
            - name: MQ_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-client-auth
                  key: password
            
            # TLS/mTLS configuration using CA certificate directly (PEM format)
            # - name: MQ_SSL_CIPHER_SUITE
            #   value: "TLS_RSA_WITH_AES_128_CBC_SHA256"
            # - name: MQ_SSL_CA_CERT_PATH
            #   value: "/etc/ssl/certs/ca.crt"

            # Uncomment below for mTLS (client certificate authentication)
            # - name: MQ_SSL_KEYSTORE_PATH
            #   value: "/etc/ssl/certs/client-keystore.jks"
            # - name: MQ_SSL_KEYSTORE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: mq-tls-certs
            #       key: keystore-password

            # Uncomment below for if you want to tweak how the SSL PEERs / Hostname are validated 
            # - name: MQ_SSL_PEER_NAME_ENABLED
            #   value: "true"
            # - name: MQ_SSL_HOSTNAME_VERIFICATION_ENABLED
            #   value: "true"
            
            # Alternative: Set Java SSL properties directly via JAVA_TOOL_OPTIONS
            # This bypasses the application code and sets JVM system properties
            # Uncomment to use JKS truststore via Java properties instead of MQ_SSL_CA_CERT_PATH
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Djavax.net.ssl.trustStore=/etc/ssl/certs/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.keyStore=/etc/ssl/certs/client-keystore.jks -Djavax.net.ssl.keyStorePassword=changeit"
            
            # Debug Logging Options (uncomment as needed for troubleshooting)
            # Option 1: Enable application DEBUG logging (SLF4J)
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Dorg.slf4j.simpleLogger.defaultLogLevel=debug"
            
            # Option 2: Enable SSL/TLS debug logging (shows certificate validation, handshake details)
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Djavax.net.debug=ssl:handshake:verbose"
            
            # Option 3: Enable all SSL debug (very verbose - shows everything)
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Djavax.net.debug=all"
            
            # Option 4: Enable specific SSL debug categories
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Djavax.net.debug=ssl,handshake,data,trustmanager"
            
            # Option 5: Enable both application DEBUG and SSL debug
            # - name: JAVA_TOOL_OPTIONS
            #   value: "-Dorg.slf4j.simpleLogger.defaultLogLevel=debug -Djavax.net.debug=ssl:handshake:verbose"
            
            # Option 6: Enable IBM MQ trace (for MQ-specific issues)
            # - name: MQJMS_TRACE_LEVEL
            #   value: "9"
            # - name: MQJMS_TRACE_DIR
            #   value: "/tmp"
          # volumeMounts:
          #   - name: tls-certs
          #     mountPath: /etc/ssl/certs
          #     readOnly: true
          #   # Uncomment below to mount CCDT file from ConfigMap
          #   - name: ccdt-config
          #     mountPath: /etc/mq
          #     readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      # # Mount CA certificate from secret (PEM format)
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: mq-tls-certs
      #       items:
      #         - key: ca.crt
      #           path: ca.crt
      #         # Uncomment below for mTLS (client certificate authentication)
      #         # - key: client-keystore.jks
      #         #   path: client-keystore.jks
      #   # Uncomment below to mount CCDT file from ConfigMap
      #   - name: ccdt-config
      #     configMap:
      #       name: mq-ccdt-config
      #       items:
      #         - key: ccdt.json
      #           path: ccdt.json
      restartPolicy: Always

# Made with Bob
